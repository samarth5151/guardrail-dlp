worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    resolver 8.8.8.8 ipv6=off;

    # ── Admin Dashboard ──────────────────────────────────────────────────────
    server {
        listen 3000;
        root /usr/share/nginx/html;
        index index.html;
        location / { try_files $uri $uri/ /index.html; }
    }

    # ── DLP Forward Proxy for LLM traffic ────────────────────────────────────
    # Intercepts CONNECT tunnels to known LLM providers.
    # In a real enterprise: use ssl_preread + stream module or mitmproxy.
    # Here: transparent HTTP proxy that rewrites targets to the DLP gateway.
    server {
        listen 8080;

        # Proxy CONNECT (HTTPS tunnelling)
        proxy_connect;
        proxy_connect_allow            443;
        proxy_connect_connect_timeout  10s;
        proxy_connect_read_timeout     60s;
        proxy_connect_send_timeout     60s;

        location / {
            proxy_pass http://gateway:8001;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
